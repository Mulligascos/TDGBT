<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#071407" />
    <meta name="background-color" content="#071407" />
    <meta name="description" content="Timaru Disc Golf Club member app" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TDG Portal" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

    <!-- Splash screens for common iOS sizes -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Android / general PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />

    <title>TDG Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
